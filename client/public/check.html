<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Homeverse — Setup Check</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #f8f9fa; }
    h1 { color: #f04d22; }
    .card { background: white; border-radius: 12px; padding: 20px; margin: 16px 0; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
    .img-box { text-align: center; }
    .img-box img { width: 100%; height: 80px; object-fit: cover; border-radius: 8px; border: 2px solid #e2e8f0; }
    .img-box img.ok { border-color: #22c55e; }
    .img-box img.err { border-color: #ef4444; background: #fee2e2; }
    .img-box p { font-size: 11px; margin: 4px 0 0; color: #64748b; word-break: break-all; }
    .status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }
    .ok  { background: #dcfce7; color: #16a34a; }
    .err { background: #fee2e2; color: #dc2626; }
    button { background: #f04d22; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    pre { background: #1e293b; color: #94a3b8; padding: 12px; border-radius: 8px; font-size: 12px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>🏠 Homeverse Setup Check</h1>
  <p>Open this file at <code>http://localhost:5173/check.html</code> after running <code>npm run dev</code></p>

  <!-- API Check -->
  <div class="card">
    <h2>1. API Server <span id="api-status" class="status">Checking…</span></h2>
    <pre id="api-result">Loading...</pre>
    <button onclick="checkAPI()">Re-check API</button>
  </div>

  <!-- Image Check -->
  <div class="card">
    <h2>2. Images</h2>
    <p>Each image below shows ✅ green border if found, ❌ red border if missing.</p>
    <div class="grid" id="img-grid"></div>
  </div>

  <script>
    const IMAGES = [
      'logo.png', 'logo-light.png', 'hero-banner.png',
      'about-banner-1.png', 'about-banner-2.jpg',
      'property-1.jpg', 'property-2.jpg', 'property-3.jpg', 'property-4.png',
      'service-1.png', 'service-2.png', 'service-3.png',
      'blog-1.png', 'blog-2.jpg', 'blog-3.jpg',
      'author.jpg',
    ];

    // Render image checks
    const grid = document.getElementById('img-grid');
    IMAGES.forEach(name => {
      const src = `/assets/images/${name}`;
      const div = document.createElement('div');
      div.className = 'img-box';
      div.innerHTML = `<img src="${src}" alt="${name}" /><p>${name}</p>`;
      const img = div.querySelector('img');
      img.onload  = () => img.classList.add('ok');
      img.onerror = () => { img.classList.add('err'); img.src = ''; img.alt = '❌ Missing'; };
      grid.appendChild(div);
    });

    // API check
    async function checkAPI() {
      const el = document.getElementById('api-status');
      const pre = document.getElementById('api-result');
      el.textContent = 'Checking…';
      el.className = 'status';
      try {
        const r = await fetch('/api/health');
        const data = await r.json();
        el.textContent = '✅ Running';
        el.className = 'status ok';
        pre.textContent = JSON.stringify(data, null, 2);
      } catch(e) {
        el.textContent = '❌ Not running';
        el.className = 'status err';
        pre.textContent = 'Error: ' + e.message + '\n\nMake sure you ran: cd server && npm install\nThen: npm run dev from the root folder';
      }
    }
    checkAPI();
  </script>
</body>
</html>
